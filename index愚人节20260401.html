<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>愚人节快乐～</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #ffe8f0;
      --bg2: #e8f4ff;
      --text: #4a4a68;
      --accent: #ff8fb8;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 55%, #fff5e6 100%);
      overflow-x: hidden;
    }

    .stage {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-bottom: env(safe-area-inset-bottom, 1rem);
    }

    .title-pill {
      font-size: clamp(0.85rem, 3vw, 1rem);
      background: rgba(255, 255, 255, 0.85);
      padding: 0.45rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(255, 143, 184, 0.2);
    }

    .scene {
      position: relative;
      width: min(100%, 420px);
      aspect-ratio: 1 / 1.05;
      max-height: 70vh;
    }

    /* 地面阴影 */
    .ground {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      height: 12%;
      background: radial-gradient(ellipse, rgba(180, 160, 200, 0.35) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 小猫 */
    .cat-wrap {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      width: min(38%, 140px);
    }

    .cat {
      width: 100%;
      display: block;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.08));
    }

    /* 气泡 —— 猫猫 */
    .bubble {
      position: absolute;
      left: 50%;
      bottom: 58%;
      transform: translateX(-50%);
      background: #fff;
      padding: 0.75rem 1.1rem;
      border-radius: 1.2rem;
      border-bottom-left-radius: 0.35rem;
      font-size: clamp(0.95rem, 4vw, 1.1rem);
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(255, 143, 184, 0.25);
      max-width: 88%;
      text-align: center;
      line-height: 1.4;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 28%;
      border: 10px solid transparent;
      border-top-color: #fff;
      border-left-color: #fff;
    }

    /* 侧面小青蛙（简约） */
    .frog {
      position: absolute;
      right: 4%;
      bottom: 22%;
      width: min(22%, 72px);
      opacity: 0.95;
    }

    /* 角落小蜜蜂 */
    .bee {
      position: absolute;
      top: 12%;
      right: 10%;
      width: min(18%, 56px);
      animation: float 3.2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      opacity: 0.6;
      text-align: center;
    }

    /* 等待 8 秒时的轻提示 */
    .waiting-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 248, 252, 0.72);
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .waiting-overlay.show {
      display: flex;
    }

    .waiting-card {
      background: #fff;
      padding: 1.25rem 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 90%;
    }

    .waiting-card span {
      font-size: 1.5rem;
      display: block;
      margin: 0.5rem 0;
      font-weight: 700;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="stage">
    <p class="title-pill">🎭 愚人节特供 · 无恶意纯玩梗</p>

    <div class="scene" aria-hidden="true">
      <div class="bee">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="32" cy="34" rx="18" ry="14" fill="#ffd54f" stroke="#f9a825" stroke-width="2"/>
          <path d="M14 32 Q8 22 14 16" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M50 32 Q56 22 50 16" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
          <ellipse cx="26" cy="30" rx="4" ry="5" fill="#333"/>
          <ellipse cx="38" cy="30" rx="4" ry="5" fill="#333"/>
          <path d="M28 40 Q32 44 36 40" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="24" y="26" width="16" height="4" fill="#333" rx="1" transform="rotate(-8 32 28)"/>
        </svg>
      </div>

      <div class="bubble">今天愚人节～</div>

      <div class="cat-wrap">
        <svg class="cat" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="60" cy="95" rx="38" ry="28" fill="#f5d0c5"/>
          <path d="M60 68 Q35 75 28 95 Q25 105 32 108 Q45 112 60 108 Q75 112 88 108 Q95 105 92 95 Q85 75 60 68" fill="#f5d0c5"/>
          <path d="M38 52 L28 22 L48 42 Z" fill="#f5d0c5" stroke="#e8b5a8" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M82 52 L92 22 L72 42 Z" fill="#f5d0c5" stroke="#e8b5a8" stroke-width="1.5" stroke-linejoin="round"/>
          <ellipse cx="48" cy="78" rx="5" ry="7" fill="#333"/>
          <ellipse cx="72" cy="78" rx="5" ry="7" fill="#333"/>
          <ellipse cx="48" cy="76" rx="2" ry="3" fill="#fff"/>
          <ellipse cx="72" cy="76" rx="2" ry="3" fill="#fff"/>
          <path d="M54 92 Q60 98 66 92" fill="none" stroke="#c97b7b" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="60" cy="102" rx="4" ry="3" fill="#ffb7c5"/>
          <path d="M42 88 Q36 90 34 94" fill="none" stroke="#e8b5a8" stroke-width="2" stroke-linecap="round"/>
          <path d="M78 88 Q84 90 86 94" fill="none" stroke="#e8b5a8" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="frog">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="40" cy="50" rx="28" ry="22" fill="#a5d6a7" stroke="#66bb6a" stroke-width="2"/>
          <circle cx="28" cy="42" r="10" fill="#fff"/>
          <circle cx="52" cy="42" r="10" fill="#fff"/>
          <circle cx="28" cy="42" r="5" fill="#333"/>
          <circle cx="52" cy="42" r="5" fill="#333"/>
          <path d="M34 58 Q40 64 46 58" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="ground"></div>
    </div>

    <p class="hint" id="hint">仅供娱乐 · 刷新页面可再来一遍</p>
  </div>

  <div class="waiting-overlay" id="waitOverlay" aria-live="polite">
    <div class="waiting-card">
      <p>说好的 8 秒… 马上就好 👀</p>
      <span id="countdown">8</span>
      <p style="font-size:0.85rem;opacity:0.7">页面没有卡死，放心～</p>
    </div>
  </div>

  <script>
    (function () {
      var messages = [
        "你确定要打开吗？",
        "真的确定吗？",
        "真的真的确定吗？",
        "千万别继续点了！",
        "你真犟",
        "来浪费你8秒的，别点了后面真的没有啦"
      ];
      var finalMessage = "嘿嘿真的什么都没有！愚乐一下 😂谢谢看到这里的你！";
      var waitMs = 8000;
      var hintEl = document.getElementById("hint");
      var overlay = document.getElementById("waitOverlay");
      var countEl = document.getElementById("countdown");
      var waitSeconds = Math.round(waitMs / 1000);

      function waitWithCountdown(seconds) {
        return new Promise(function (resolve) {
          var left = seconds;
          if (countEl) countEl.textContent = String(left);
          var id = setInterval(function () {
            left -= 1;
            if (left <= 0) {
              clearInterval(id);
              resolve();
              return;
            }
            if (countEl) countEl.textContent = String(left);
          }, 1000);
        });
      }

      async function startChain() {
        for (var i = 0; i < messages.length; i++) {
          if (!window.confirm(messages[i])) {
            if (hintEl) {
              hintEl.textContent = "你点了取消～页面照常能用，愚人节快乐！";
            }
            return;
          }
        }

        if (overlay) overlay.classList.add("show");
        await waitWithCountdown(waitSeconds);
        if (overlay) overlay.classList.remove("show");

        window.confirm(finalMessage);
        if (hintEl) {
          hintEl.textContent = "通关！可以关掉页面啦～明年愚人节见 🎉";
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          setTimeout(startChain, 300);
        });
      } else {
        setTimeout(startChain, 300);
      }
    })();
  </script>
</body>
</html>
