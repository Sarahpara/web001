<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AAA首通cursor个人简介</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(15, 23, 42, 0.9);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.25);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-subtle: rgba(148, 163, 184, 0.3);
      --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.8);
      --radius-xl: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.35), transparent 55%),
        radial-gradient(circle at bottom right, rgba(129, 140, 248, 0.25), transparent 55%),
        var(--bg-color);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    /* 主卡片 */
    .card {
      position: relative;
      width: min(420px, 92vw);
      padding: 28px 26px 24px;
      border-radius: var(--radius-xl);
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      transform: translateY(0);
      transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: conic-gradient(
        from 150deg,
        rgba(56, 189, 248, 0.9),
        rgba(129, 140, 248, 0.4),
        rgba(56, 189, 248, 0.9)
      );
      opacity: 0;
      transition: opacity 260ms ease;
      z-index: -1;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.95);
      border-color: rgba(148, 163, 184, 0.65);
    }

    .card:hover::before {
      opacity: 0.2;
    }

    /* 顶部小标签 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.45);
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    /* 上半部分：头像 + 基本信息 */
    .top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    /* 头像框（可放图片） */
    .avatar-wrapper {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 26px;
      padding: 2px;
      background:
        radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.8), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.8), transparent 55%);
    }

    .avatar-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      background:
        radial-gradient(circle at 30% 20%, rgba(248, 250, 252, 0.06), transparent 60%),
        radial-gradient(circle at 80% 90%, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 1));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.9);
    }

    .avatar-inner span {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #e5e7eb;
    }

    /* 如需使用真实头像图片，把 .avatar-inner 内容换成 <img>：
       .avatar-inner img { width: 100%; height: 100%; object-fit: cover; } */

    /* 名字、简介 */
    .info {
      flex: 1;
      min-width: 0;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .name-pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* 分割线 */
    .divider {
      height: 1px;
      width: 100%;
      margin: 16px 0 14px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(148, 163, 184, 0.7),
        transparent
      );
      opacity: 0.85;
    }

    /* 下半部分：一句话介绍 + 按钮 */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .one-line {
      font-size: 13px;
      color: var(--text-main);
      opacity: 0.9;
      line-height: 1.5;
    }

    .one-line span {
      color: var(--accent);
    }

    /* 按钮 */
    .primary-btn {
      position: relative;
      overflow: hidden;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 9px 18px;
      border-radius: 999px;
      background: radial-gradient(circle at 0% 0%, #38bdf8, #6366f1);
      color: #0b1220;
      font-size: 13px;
      font-weight: 550;
      letter-spacing: 0.03em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      box-shadow:
        0 14px 40px rgba(56, 189, 248, 0.5),
        0 0 0 1px rgba(15, 23, 42, 0.85);
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        filter 180ms ease,
        background-position 220ms ease;
      background-size: 160% 160%;
      background-position: 0 50%;
    }

    .primary-btn span.icon {
      font-size: 14px;
      translate: 0 0;
      transition: translate 180ms ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      background-position: 15% 50%;
      filter: brightness(1.04);
      box-shadow:
        0 18px 55px rgba(56, 189, 248, 0.6),
        0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    .primary-btn:active {
      transform: translateY(0);
      box-shadow:
        0 8px 26px rgba(56, 189, 248, 0.5),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      filter: brightness(0.98);
    }

    .primary-btn:hover .icon {
      translate: 2px -1px;
    }

    /* 微妙的发光背景 */
    .glow {
      position: absolute;
      inset: -80px;
      pointer-events: none;
      background:
        radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.13), transparent 60%),
        radial-gradient(circle at 100% 60%, rgba(129, 140, 248, 0.2), transparent 65%);
      opacity: 0.8;
      mix-blend-mode: screen;
      z-index: -2;
    }

    /* 小屏适配 */
    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 20px;
        border-radius: 20px;
      }

      .avatar-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 22px;
      }

      .info {
        margin-right: 2px;
      }

      .name {
        font-size: 20px;
      }

      .subtitle {
        font-size: 12px;
      }

      .bottom {
        flex-direction: column;
        align-items: flex-start;
      }

      .primary-btn {
        align-self: stretch;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="profile-card">
    <div class="glow"></div>

    <div class="badge">
      <span class="badge-dot"></span>
    （这里不知道写什么）
    </div>

    <div class="top">
      <div class="avatar-wrapper">
        <div class="avatar-inner" id="avatar">
          <!-- 可改为自己的首字母，例如 “LY” -->
          <span>H</span>
        </div>
      </div>

      <div class="info">
        <div class="name">
          <span id="name">Hooyah</span>
          <span class="name-pill">中国富豪榜前14亿名</span>
        </div>
        <p class="subtitle" id="subtitle">
          HELLO WORLD！这是我vibe coding的第一次尝试。
        </p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bottom">
      <p class="one-line" id="one-line">
        正在专注于 <span>苦兮兮考研 · 美滋滋vibe coding · 希望人没事</span> 木樨地服役版^^
      </p>

      <button class="primary-btn" id="action-btn">
        <span>千万不要点！</span>
        <span class="icon">↗</span>
      </button>
    </div>
  </div>

  <script>
    // 按钮点击交互，可以根据需要改为跳转邮箱/简历链接
    const actionBtn = document.getElementById("action-btn");

    actionBtn.addEventListener("click", () => {
      // 这里你可以替换为：window.open("mailto:you@example.com");
      // 或者 window.open("https://your-portfolio.com", "_blank");
      const name = document.getElementById("name").textContent.trim() || "我";
      alert(name + ": 呵，有个性 👋");
    });

    // 轻微鼠标跟随动效（可选）
    const card = document.getElementById("profile-card");
    let mouseTimeout;

    card.addEventListener("mousemove", (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      const rotateX = (y / rect.height) * -6;
      const rotateY = (x / rect.width) * 6;

      card.style.transform =
        `translateY(-2px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

      clearTimeout(mouseTimeout);
      mouseTimeout = setTimeout(() => {
        card.style.transform = "translateY(0) rotateX(0) rotateY(0)";
      }, 120);
    });

    card.addEventListener("mouseleave", () => {
      card.style.transform = "translateY(0) rotateX(0) rotateY(0)";
    });
  </script>
</body>
</html>
